# MP CI: push → build → miniprogram-ci upload → 设开发版
# 不需要服务器公网 IP — miniprogram-ci 走 WeChat 平台 API
# IP 白名单默认关（不开启）

name: MP CI

on:
  push:
    branches: [develop, main]
    paths:
      - 'apps/mp/**'
      - '.github/workflows/mp-ci.yml'
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build mini-program
        run: |
          cd apps/mp
          pnpm add -D miniprogram-ci
          npx miniprogram-ci \
            --appid "${{ secrets.WX_APPID }}" \
            --private-key "${{ secrets.WX_PRIVATE_KEY }}" \
            --project ./ \
            --uv 1 \
            --rv 1 \
            --enable-es6 true \
            --enable-es7 true \
            --enable-minifyWXSS true \
            --enable-minifyWXML true \
            --enable-minifyJS true \
            --miniprogram-npm 1

      - name: Upload to WeChat
        run: |
          cd apps/mp
          npx miniprogram-ci upload \
            --appid "${{ secrets.WX_APPID }}" \
            --private-key "${{ secrets.WX_PRIVATE_KEY }}" \
            --project ./ \
            --uv 1 \
            --rv 1 \
            --desc "CI auto-upload from $(git rev-parse --short HEAD)"

      - name: Set as dev version
        run: |
          cd apps/mp
          # 通过 HTTP API 设开发版（不需要公网 IP — 走 WeChat 平台）
          curl -X POST "https://api.weixin.qq.com/wxa/setversion" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"$(curl -s 'https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid=${{ secrets.WX_APPID }}&secret=${{ secrets.WX_PRIVATE_KEY }}' | python3 -c 'import json,sys; print(json.load(sys.stdin)[\"access_token\"])')\",
              \"version_id\": \"$(npx miniprogram-ci preview --appid ${{ secrets.WX_APPID }} --private-key ${{ secrets.WX_PRIVATE_KEY }} --project ./ 2>&1 | grep -oP 'version_id\\\":\\\"[^\"]+' | head -1 | cut -d'\"' -f3)\"
            }"
          echo "✓ Dev version set"

      - name: Get QR code for 体验版
        if: always()
        run: |
          echo "📱 体验版二维码（扫码即最新版 dev）"
          ACCESS_TOKEN=$(curl -s "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid=${{ secrets.WX_APPID }}&secret=${{ secrets.WX_PRIVATE_KEY }}" | python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])')
          # 体验版路径固定为 dev/1，每次上传会自动更新
          QR_URL="open://micromessenger?appid=${{ secrets.WX_APPID }}&path=pages%2Fmatrix%2Fmatrix&version=develop"
          # 实际二维码用 getwxacodeunlimit 生成（scene=dev/1）
          curl -s -X POST "https://api.weixin.qq.com/wxa/getwxacodeunlimit" \
            -H "Content-Type: application/json" \
            -d "{\"access_token\":\"$ACCESS_TOKEN\",\"scene\":\"dev/1\",\"path\":\"pages/matrix/matrix\",\"width\":430}" \
            -o qrcode.png
          echo "  qrcode.png 已生成（$(ls -la qrcode.png | awk '{print $5}') bytes）"
          echo ""
          echo "📌 测试流程："
          echo "  1. 微信小程序后台 → 成员管理 → 添加体验成员（你的微信号）"
          echo "  2. 体验管理 → 扫码下载开发版 → 体验成员收到通知"
          echo "  3. 以后 push 代码 → CI 自动上传新 dev version → 体验版自动更新"
          echo "  4. 体验成员不需要重新扫码，每次进 app 都会下载最新版"
          echo ""
          echo "🔗 体验版路径：pages/matrix/matrix"
