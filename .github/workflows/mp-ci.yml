# MP CI: push → build → miniprogram-ci upload → 设开发版 → QR
# 不需要服务器公网 IP — miniprogram-ci 走 WeChat 平台 API
# IP 白名单默认关（不开启）

name: MP CI

on:
  push:
    branches: [develop, main]
    paths:
      - 'apps/mp/**'
      - '.github/workflows/mp-ci.yml'
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build mini-program
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_PRIVATE_KEY: ${{ secrets.WX_PRIVATE_KEY }}
        run: |
          cd apps/mp
          npm install miniprogram-ci --no-save
          ./node_modules/.bin/miniprogram-ci \
            --appid "$WX_APPID" \
            --private-key "$WX_PRIVATE_KEY" \
            --project ./ \
            --uv 1 \
            --rv 1 \
            --enable-es6 true \
            --enable-es7 true \
            --enable-minifyWXSS true \
            --enable-minifyWXML true \
            --enable-minifyJS true \
            --miniprogram-npm 1

      - name: Upload to WeChat
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_PRIVATE_KEY: ${{ secrets.WX_PRIVATE_KEY }}
        run: |
          cd apps/mp
          ./node_modules/.bin/miniprogram-ci upload \
            --appid "$WX_APPID" \
            --private-key "$WX_PRIVATE_KEY" \
            --project ./ \
            --uv 1 \
            --rv 1 \
            --desc "CI auto-upload from $(git rev-parse --short HEAD)"

      - name: Get experience QR code
        if: always()
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_PRIVATE_KEY: ${{ secrets.WX_PRIVATE_KEY }}
        run: |
          cd apps/mp
          ACCESS_TOKEN=$(curl -s "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid=$WX_APPID&secret=$WX_PRIVATE_KEY" | python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])')
          curl -s -X POST "https://api.weixin.qq.com/wxa/getwxacodeunlimit" \
            -H "Content-Type: application/json" \
            -d "{\"access_token\":\"$ACCESS_TOKEN\",\"scene\":\"dev/1\",\"path\":\"pages/matrix/matrix\",\"width\":430}" \
            -o qrcode.png
          echo "qrcode.png $(stat -c%s qrcode.png 2>/dev/null || ls -la qrcode.png | awk '{print $5}') bytes"

      - name: Upload QR as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mp-qrcode
          path: apps/mp/qrcode.png

      - name: Summary
        if: always()
        run: |
          echo "✅ Mini-program dev version uploaded"
          echo "📱 体验版二维码：见 artifact 'mp-qrcode'"
          echo ""
          echo "首次使用："
          echo "  1. 微信小程序后台 → 成员管理 → 添加体验成员（你的微信号）"
          echo "  2. 体验管理 → 扫码下载开发版（扫上面 artifact 的 qrcode.png）"
          echo "  3. 之后 push → 自动上传新 dev → 体验版自动更新"
          echo "  4. 体验成员不需要重新扫码，每次进 app 都会下载最新版"
