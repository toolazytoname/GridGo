# MP CI: push → build → miniprogram-ci upload → 体验版 → QR
# 走 WeChat 开放接口，不需要服务器公网 IP

name: MP CI

on:
  push:
    branches: [develop, main]
    paths:
      - 'apps/mp/**'
      - '.github/workflows/mp-ci.yml'
      - 'pnpm-lock.yaml'         # lockfile 改了也会影响 miniprogram-ci 解析
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install MP deps (miniprogram-ci)
        working-directory: apps/mp
        run: npm install --no-audit --no-fund

      - name: Build mini-program
        working-directory: apps/mp
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          # 必须是 PEM 格式的 RSA 私钥，从 mp.weixin.qq.com → 开发管理 → 代码上传密钥 生成
          WX_PRIVATE_KEY: ${{ secrets.WX_PRIVATE_KEY }}
        run: |
          set -e
          mkdir -p .keys
          # private key 写到临时文件（miniprogram-ci 只接文件路径）
          printf '%s' "$WX_PRIVATE_KEY" > .keys/wx.pem
          chmod 600 .keys/wx.pem
          echo "key file size: $(wc -c < .keys/wx.pem) bytes"
          head -1 .keys/wx.pem
          ./node_modules/.bin/miniprogram-ci \
            --appid "$WX_APPID" \
            --pkp ./.keys/wx.pem \
            --pp ./ \
            --uv 1 \
            --rv 1 \
            --enable-es6 true \
            --enable-es7 true \
            --enable-minifyWXSS true \
            --enable-minifyWXML true \
            --enable-minifyJS true

      - name: Upload to WeChat (experience version)
        working-directory: apps/mp
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_PRIVATE_KEY: ${{ secrets.WX_PRIVATE_KEY }}
        run: |
          set -e
          printf '%s' "$WX_PRIVATE_KEY" > .keys/wx.pem
          chmod 600 .keys/wx.pem
          ./node_modules/.bin/miniprogram-ci upload \
            --appid "$WX_APPID" \
            --pkp ./.keys/wx.pem \
            --pp ./ \
            --uv 1 \
            --rv 1 \
            --desc "CI auto-upload from $(git rev-parse --short HEAD)"

      - name: Generate experience QR code
        if: always()
        working-directory: apps/mp
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          # AppSecret（32 位 hex），不是 PEM。跟 WX_PRIVATE_KEY 分开。
          WX_APP_SECRET: ${{ secrets.WX_APP_SECRET }}
        run: |
          set -e
          echo "→ 获取 access_token…"
          ACCESS_TOKEN=$(curl -sS --max-time 15 "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid=$WX_APPID&secret=$WX_APP_SECRET" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin).get("access_token",""))')
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ access_token 取不到（AppSecret 不对？）— 跳过 QR"
            exit 0
          fi
          echo "→ token OK (len=${#ACCESS_TOKEN})"
          # 抓 headers 看 content-type
          curl -sS --max-time 15 -D /tmp/headers.txt -X POST "https://api.weixin.qq.com/wxa/getwxacodeunlimit" \
            -H "Content-Type: application/json" \
            -d "{\"access_token\":\"$ACCESS_TOKEN\",\"scene\":\"dev\",\"path\":\"pages/matrix/matrix\",\"width\":430}" \
            -o qrcode.raw
          echo "--- response headers ---"
          cat /tmp/headers.txt
          echo "--- first 4 bytes (hex) ---"
          head -c 4 qrcode.raw | xxd
          echo "--- size + first 500 bytes (text) ---"
          echo "size: $(stat -c%s qrcode.raw) bytes"
          head -c 500 qrcode.raw
          echo ""
          # 简单判断：PNG 头是 89 50 4E 47
          FIRST4=$(head -c 4 qrcode.raw | xxd -p)
          if [ "$FIRST4" = "89504e47" ]; then
            mv qrcode.raw qrcode.png
            echo "✅ valid PNG, $(stat -c%s qrcode.png) bytes"
          else
            # 不是 PNG — 是 JSON 错误响应
            cp qrcode.raw qrcode-error.json
            echo "❌ not PNG — saved as qrcode-error.json (likely WeChat API error response)"
            exit 0   # 不让 CI 红，错误信息已在 log
          fi

      - name: Upload QR as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mp-qrcode
          path: |
            apps/mp/qrcode.png
            apps/mp/qrcode-error.json
          if-no-files-found: warn

      - name: Summary
        if: always()
        run: |
          echo "✅ MP CI run finished"
          echo ""
          echo "📱 体验二维码：见 artifact 'mp-qrcode'"
          echo ""
          echo "首次使用："
          echo "  1. mp.weixin.qq.com → 成员管理 → 添加体验成员（你的微信号）"
          echo "  2. 体验管理 → 扫码绑定（扫 artifact 的 qrcode.png）"
          echo "  3. 之后 push → 自动上传新 dev → 体验版自动更新（成员无需重新扫码）"
