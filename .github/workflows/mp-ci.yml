# MP CI: push → miniprogram-ci preview → 上传开发版 + 生成 dev preview QR
# 走 WeChat 开放接口 + private key，不需要服务器公网 IP，也不需要 AppSecret

name: MP CI

on:
  push:
    branches: [develop, main]
    paths:
      - 'apps/mp/**'
      - '.github/workflows/mp-ci.yml'
      - 'pnpm-lock.yaml'         # lockfile 改了也会影响 miniprogram-ci 解析
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install MP deps (miniprogram-ci)
        working-directory: apps/mp
        run: npm install --no-audit --no-fund

      - name: Build + upload + dev preview QR
        if: always()
        working-directory: apps/mp
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          # 必须是 PEM 格式的 RSA 私钥，从 mp.weixin.qq.com → 开发管理 → 代码上传密钥 生成
          WX_PRIVATE_KEY: ${{ secrets.WX_PRIVATE_KEY }}
        run: |
          set -e
          mkdir -p .keys
          # private key 写到临时文件（miniprogram-ci 只接文件路径）
          printf '%s' "$WX_PRIVATE_KEY" > .keys/wx.pem
          chmod 600 .keys/wx.pem
          echo "key file size: $(wc -c < .keys/wx.pem) bytes"
          head -1 .keys/wx.pem
          # preview 子命令：编译 + 上传 + 生成 dev preview QR（用 private key 直连 WeChat）
          # --uv/--rv 是 upload-version / robot-version
          # --enable-qrcode + --qrcode-format image + --qrcode-output-dest 写出 QR 图片
          ./node_modules/.bin/miniprogram-ci preview \
            --appid "$WX_APPID" \
            --pkp ./.keys/wx.pem \
            --pp ./ \
            --uv 1 --rv 1 \
            --enable-es6 true \
            --enable-es7 true \
            --enable-minifyWXSS true \
            --enable-minifyWXML true \
            --enable-minifyJS true \
            --enable-qrcode \
            --qrcode-format image \
            --qrcode-output-dest ./qrcode.png
          ls -la qrcode.png
          file qrcode.png || true
          # 清理私钥文件
          rm -f .keys/wx.pem

      - name: Upload QR as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mp-qrcode
          path: apps/mp/qrcode.png
          if-no-files-found: warn

      - name: Summary
        if: always()
        run: |
          echo "✅ MP CI run finished"
          echo ""
          echo "📱 dev preview 二维码：见 artifact 'mp-qrcode'"
          echo ""
          echo "扫码测试："
          echo "  1. 微信开发者工具 → 添加项目 → 公众号测试号 → 用 appid 登录"
          echo "  2. 用开发者工具的「二维码」→ 扫 artifact 里的 qrcode.png"
          echo "     （或真机扫码进入 dev preview）"
          echo ""
          echo "push → 自动 build + 上传 + 生成新 QR"
